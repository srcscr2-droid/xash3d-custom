name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Клонирование репозитория С подмодулями
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 2. Установка Java 17
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Установка Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 12266719
          packages: 'tools platform-tools'

      # 4. Установка NDK r21e
      - name: Install NDK
        run: |
          echo "y" | sdkmanager "ndk;21.4.7075529" --channel=0
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/21.4.7075529" >> $GITHUB_ENV

      # 5. Проверка подмодулей
      - name: Check submodules
        run: |
          echo "=== Проверка подмодулей ==="
          git submodule status
          echo "=== Содержимое 3rdparty ==="
          ls -la 3rdparty/ 2>/dev/null || echo "Папка 3rdparty не найдена!"
          echo "=== Содержимое engine/platform/android ==="
          ls -la engine/platform/android/ 2>/dev/null || echo "Папка не найдена!"

      # 6. Клонирование недостающих зависимостей (с аутентификацией)
      - name: Clone missing dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Настраиваем git для использования токена
          git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          
          # Клонируем NanoGL
          if [ ! -d "nanogl" ] && [ ! -d "3rdparty/nanogl" ]; then
            git clone --depth 1 https://github.com/FWGS/nanogl.git nanogl || true
          fi
          
          # Клонируем SDL2
          if [ ! -d "3rdparty/SDL" ]; then
            mkdir -p 3rdparty
            git clone --depth 1 --branch SDL2 https://github.com/FWGS/SDL.git 3rdparty/SDL || true
          fi
          
          # Клонируем HLSDK
          if [ ! -d "3rdparty/hlsdk-portable" ]; then
            git clone --depth 1 --branch mobile-hacks https://github.com/FWGS/hlsdk-portable.git 3rdparty/hlsdk-portable || true
          fi
          
          # Убираем настройку git (безопасность)
          git config --global --unset url."https://${GITHUB_TOKEN}@github.com/".insteadOf || true

      # 7. Исправление отсутствующего файла dlsym-weak.cpp
      - name: Fix missing dlsym-weak.cpp
        run: |
          mkdir -p engine/platform/android
          cat > engine/platform/android/dlsym-weak.cpp << 'EOF'
          // Stub for dlsym-weak.cpp - required for Android build
          #include <dlfcn.h>
          #include <android/log.h>
          
          #define LOG_TAG "XASH3D"
          #define LOGI(...) __android_log_print(ANDROID_LOG_INFO, LOG_TAG, __VA_ARGS__)
          
          extern "C" {
          void *dlsym_weak(void *handle, const char *symbol)
          {
              void *addr = dlsym(handle, symbol);
              if (!addr) {
                  LOGI("dlsym_weak: symbol '%s' not found", symbol);
              }
              return addr;
          }
          }
          EOF

      # 8. Сборка через ndk-build
      - name: Build with ndk-build
        run: |
          NDK=$ANDROID_NDK_HOME
          $NDK/ndk-build \
            APP_ABI="armeabi-v7a arm64-v8a" \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=engine/Android.mk \
            NDK_APPLICATION_MK=Application.mk \
            -j$(nproc) || true

      # 9. Поиск собранных файлов
      - name: Find built files
        run: |
          echo "=== Поиск APK ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "APK не найден"
          
          echo "=== Поиск .so файлов ==="
          find . -name "*.so" -type f 2>/dev/null || echo ".so файлы не найдены"
          
          echo "=== Содержимое libs/ ==="
          ls -laR libs/ 2>/dev/null || echo "Папка libs пуста"

      # 10. Загрузка артефактов
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: xash3d-build
          path: |
            **/*.apk
            **/*.so
            libs/**/*
            obj/**/*
          if-no-files-found: warn
          retention-days: 30
