name: Android APK Build

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | sdkmanager "ndk;21.4.7075529" --channel=0
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/21.4.7075529" >> $GITHUB_ENV

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: |
          if [ -f game_launch/gradlew ]; then chmod +x game_launch/gradlew; fi
          if [ -f gradlew ]; then chmod +x gradlew; fi

      - name: Build Debug APK
        run: |
          if [ -f game_launch/build.gradle ]; then
            cd game_launch
            ./gradlew assembleDebug --no-daemon
          elif [ -f build.gradle ]; then
            ./gradlew assembleDebug --no-daemon
          else
            echo "No Gradle build file found, skipping Gradle step"
          fi

      - name: Build with NDK (ndk-build)
        run: |
          NDK=$ANDROID_NDK_HOME
          $NDK/ndk-build -C . APP_ABI="armeabi-v7a arm64-v8a" \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=engine/Android.mk \
            NDK_APPLICATION_MK=Application.mk \
            -j$(nproc) || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: xash3d-android-${{ github.sha }}
          path: |
            **/*.apk
            **/*.so
          if-no-files-found: warn
          retention-days: 30

  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build \
            gcc-multilib g++-multilib \
            libsdl2-dev libfreetype6-dev \
            libfontconfig1-dev

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DXASH_DEDICATED=OFF \
            -DXASH_64BIT=1

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: xash3d-linux-${{ github.sha }}
          path: build/
          if-no-files-found: warn
          retention-days: 14
